services:
  db:
    image: postgres:16
    container_name: tournahub_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:${DB_PORT}"
    command: -p ${DB_PORT}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME} -p ${DB_PORT}"]
      interval: 5s
      timeout: 5s
      retries: 5
  backend:
    build: .
    container_name: tournahub
    restart: always
    depends_on:
      db:
        condition: service_healthy 
    env_file:
      - .env  
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@db:${DB_PORT}/${DB_NAME}
      - DB_HOST=db
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: >
      sh -c "uv run alembic upgrade head && 
             uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  postgres_data: